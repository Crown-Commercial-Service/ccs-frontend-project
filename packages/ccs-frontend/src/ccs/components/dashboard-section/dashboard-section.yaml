params:
  - name: panels
    type: array
    required: true
    description: Array of items that are the panels which are displayed to the user
    params:
      - name: titleText
        type: string
        required: true
        description: Title for the panel
      - name: href
        type: string
        required: true
        description: The href for the panel
      - name: descriptionText
        type: string
        required: true
        description: Description for the panel
      - name: width
        type: string
        required: false
        description: Width of the panel. Defaults to one third width. You can pass any design system grid width here, for example, 'one-third'; 'two-thirds'; 'one-half'.
      - name: attributes
        type: object
        required: false
        description: HTML attributes (for example data attributes) to add to the panel.
  - name: titleText
    type: string
    required: false
    description: Text for the title of the dashbaord section
  - name: width
    type: string
    required: false
    description: Width of the dashboard section. Defaults to full width. You can pass any design system grid width here, for example, 'one-third'; 'two-thirds'; 'one-half'.
  - name: classes
    type: string
    required: false
    description: Classes to add to the dashboard section container.
  - name: attributes
    type: object
    required: false
    description: HTML attributes (for example data attributes) to add to the dashboard section container.

examples:
  - name: default
    description: Dashboard panels without a title
    options:
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
        - titleText: View your saved searches
          href: /view-your-saved-searches
          descriptionText: Open your dashboard to view your previously saved searches

  - name: with title text
    description: Dashboard panels with a title
    options:
      titleText: Framework dashboard
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
        - titleText: View your saved searches
          href: /view-your-saved-searches
          descriptionText: Open your dashboard to view your previously saved searches

  - name: with one long panel
    description: Shows that the panels will flex to be the same length when one description is longer than the others
    options:
      panels:
        - titleText: Panel one
          href: /panel-one
          descriptionText: This is the description for panel one
        - titleText: Panel two
          href: /panel-two
          descriptionText: This is the description for panel two and it is a very long description that goes over many many lines
        - titleText: Panel three
          href: /panel-three
          descriptionText: This is the description for panel three

  - name: with dashboard width two-thirds
    description: Shows the panels shrink when the dashboard section is smaller
    options:
      width: two-thirds
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
        - titleText: View your saved searches
          href: /view-your-saved-searches
          descriptionText: Open your dashboard to view your previously saved searches

  - name: with a panel width two-thirds
    description: Shows with one panel larger than the other
    options:
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
          width: two-thirds
        - titleText: View your saved searches
          href: /view-your-saved-searches
          descriptionText: Open your dashboard to view your previously saved searches

  - name: with panel widths one-half
    description: Shows two wide panels
    options:
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
          width: one-half
        - titleText: View your saved searches
          href: /view-your-saved-searches
          descriptionText: Open your dashboard to view your previously saved searches
          width: one-half

  # Hidden examples are not shown in the review app, but are used for tests and HTML fixtures
  - name: attributes
    hidden: true
    options:
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
      attributes:
        data-test-attribute: value
        data-test-attribute-2: value-2

  - name: classes
    hidden: true
    options:
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
      classes: app-dashboard-section--custom-modifier

  - name: panel item with attributes
    hidden: true
    options:
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
          attributes:
            data-test-attribute: value
            data-test-attribute-2: value-2

  - name: panel item with classes
    hidden: true
    options:
      panels:
        - titleText: Search for suppliers
          href: /search-for-suppliers
          descriptionText: Find a shortlist of suppliers who can provide services to your locations
          classes: app-dashboard-section-panel--custom-modifier
