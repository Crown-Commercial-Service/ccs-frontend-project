params:
  - name: passwordId
    type: string
    required: true
    description: The ID for the password element that will be checked against
  - name: tests
    type: array
    required: true
    description: An array of 
    params:
      - name: type
        type: string
        required: true
        description: 'The type of the test, one of: length, symbol, number, uppercase, lowercase'
      - name: value
        type: string
        required: false
        description: |
          This is required if type is length and is the required length of the password.
          This is required if type is symbol and is the list of allowed symbols.
      - name: text
        type: string
        required: false
        description: Optional text for the test. If not given then a default will be used
  - name: classes
    type: string
    required: false
    description: Classes to add to the header password strength list.
  - name: attributes
    type: object
    required: false
    description: HTML attributes (for example data attributes) to add to the password strength list.

examples:
  - name: default
    description: Password strength with length
    options:
      passwordId: password
      tests:
        - type: length
          value: 10

  - name: with symbol test
    description: Password strength with symbols
    options:
      passwordId: password
      tests:
        - type: symbol
          value: =+\-^$*.[\]{}()?"!@#%&/\\,><':;|_~`

  - name: with number test
    description: Password strength with number
    options:
      passwordId: password
      tests:
        - type: number

  - name: with uppercase test
    description: Password strength with uppercase
    options:
      passwordId: password
      tests:
        - type: uppercase

  - name: with lowercase test
    description: Password strength with lowercase
    options:
      passwordId: password
      tests:
        - type: lowercase
  
  - name: with all the tests
    description: Password strength with all the tests
    options:
      passwordId: password
      tests:
        - type: length
          value: 10
        - type: symbol
          value: =+\-^$*.[\]{}()?"!@#%&/\\,><':;|_~`
        - type: number
        - type: uppercase
        - type: lowercase

  - name: with custom text for all the tests
    description: Password strength with all the tests having custom text
    options:
      passwordId: password
      tests:
        - type: length
          value: 10
          text: Custom text for length
        - type: symbol
          value: =+\-^$*.[\]{}()?"!@#%&/\\,><':;|_~`
          text: Custom text for symbol
        - type: number
          text: Custom text for number
        - type: uppercase
          text: Custom text for uppercase
        - type: lowercase
          text: Custom text for lowercase

  # Hidden examples are not shown in the review app, but are used for tests and HTML fixtures
  - name: attributes
    hidden: true
    options:
      passwordId: password
      attributes:
        data-test-attribute: value
        data-test-attribute-2: value-2

  - name: classes
    hidden: true
    options:
      passwordId: password
      classes: app-password-strength--custom-modifier
